name: Build TWRP (Fixed)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04  # 使用 22.04 版本，兼容性更好
    steps:
    - name: 清理磁盘空间 (防止空间不足)
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc
        sudo rm -rf "/usr/local/share/boost"
        sudo rm -rf /usr/lib/jvm

    - name: 准备编译环境
      run: |
        sudo apt update
        sudo apt install -y git-core gnupg flex bison build-essential zip curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 libncursesw5 libncurses-dev x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig python3 python-is-python3

    - name: 安装 Repo
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: 同步 TWRP 源码
      run: |
        mkdir twrp
        cd twrp
        git config --global user.email "twrp@build.me"
        git config --global user.name "twrp"
        # 使用 --depth=1 极大地减少下载体积
        repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1
        repo sync -j$(nproc) --force-sync --no-tags --no-clone-bundle

    - name: 克隆设备树
      run: |
        cd twrp
        git clone https://github.com/WenHao-Dev/twrp_device_oppo_taylor.git device/oppo/taylor

    - name: 开始编译
      run: |
        cd twrp
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        lunch twrp_taylor-eng
        mka recoveryimage -j$(nproc)

    - name: 上传 Recovery 镜像
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-Taylor-K11
        path: |
          twrp/out/target/product/taylor/*.img
          twrp/out/target/product/taylor/*.zip
