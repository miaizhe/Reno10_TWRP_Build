name: Build TWRP

on:
  workflow_dispatch: # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 准备环境
      run: |
        sudo apt update
        sudo apt install -y git-core gnupg flex bison build-essential zip curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 libncurses5 lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig python3

    - name: 安装 Repo
      run: |
        mkdir ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: 同步 TWRP 源码
      run: |
        mkdir twrp
        cd twrp
        git config --global user.email "you@example.com"
        git config --global user.name "Your Name"
        repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1
        repo sync -j$(nproc) --force-sync

    - name: 克隆设备树
      run: |
        cd twrp
        git clone https://github.com/WenHao-Dev/twrp_device_oppo_taylor.git device/oppo/taylor

    - name: 开始编译
      run: |
        cd twrp
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        lunch twrp_taylor-eng
        mka recoveryimage -j$(nproc)

    - name: 上传产物
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-taylor
        path: twrp/out/target/product/taylor/*.img
