name: 自动生成并修复 TWRP 设备树

on:
  workflow_dispatch:
    inputs:
      boot_url:
        description: '请输入 boot.img 的直接下载链接'
        required: true
        type: string
      vendor_name:
        description: '厂商名称 (例如: oppo)'
        default: 'oppo'
      device_code:
        description: '设备代号 (例如: PHW110)'
        default: 'PHW110'

jobs:
  build-tree:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 安装环境与工具
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip cpio
          pip3 install twrpdtgen

      - name: 下载 Boot 镜像
        run: |
          wget -O boot.img "${{ github.event.inputs.boot_url }}"
          if [ ! -f boot.img ]; then echo "下载失败！"; exit 1; fi

      - name: 使用 twrpdtgen 逆向生成
        run: |
          # 生成初步的设备树
          mkdir raw_output
          python3 -m twrpdtgen boot.img -o raw_output/

      - name: 自动化路径修复与清理
        run: |
          # 1. 定位生成的文件夹 (twrpdtgen 默认按厂商/代号生成)
          # 假设生成在 raw_output/oppo/PHW110
          TARGET_DIR=$(find raw_output -type d -name "${{ github.event.inputs.device_code }}" | head -n 1)
          echo "Target Directory: $TARGET_DIR"
          
          if [ -z "$TARGET_DIR" ]; then
            echo "生成失败，未找到输出目录"
            exit 1
          fi

          # 2. 核心修复：将所有错误的 lahaina 或 qualcomm 引用替换为真实路径
          # 强制将 LOCAL_PATH 指向你最终存放的目录
          FINAL_PATH="device/${{ github.event.inputs.vendor_name }}/${{ github.event.inputs.device_code }}"
          
          find "$TARGET_DIR" -type f \( -name "*.mk" -o -name "*.sh" -o -name "Android.mk" \) -exec sed -i "s|device/qualcomm/lahaina|$FINAL_PATH|g" {} +
          find "$TARGET_DIR" -type f \( -name "*.mk" -o -name "*.sh" -o -name "Android.mk" \) -exec sed -i "s|LOCAL_PATH := .*|LOCAL_PATH := $FINAL_PATH|g" {} +
          
          # 3. 移除 vendorsetup.sh 中的过时命令 (防止 lunch 报错)
          if [ -f "$TARGET_DIR/vendorsetup.sh" ]; then
            sed -i '/add_lunch_combo/d' "$TARGET_DIR/vendorsetup.sh"
          fi

          # 4. 准备打包
          mkdir final_tree
          cp -r "$TARGET_DIR"/* final_tree/

      - name: 上传修复后的完整设备树
        uses: actions/upload-artifact@v4
        with:
          name: TWRP_Tree_${{ github.event.inputs.device_code }}_Fixed
          path: final_tree/
